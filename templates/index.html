<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmFinder | Premium Movie Recommendations</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1 class="logo">Film<span class="highlight">Finder</span></h1>
            <p class="subtitle">Discover your next favorite movie</p>
        </header>

        <section class="search-section">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Type a movie you love..." autocomplete="off">
                <button id="search-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
                <div id="autocomplete-list" class="autocomplete-items"></div>
            </div>
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <span>Finding matches...</span>
            </div>
        </section>

        <section id="results-section" class="hidden">
            <h2 id="results-title">Because you watched <span id="searched-movie" class="highlight"></span></h2>
            <div id="movie-grid" class="movie-grid">
                <!-- Movie cards will be inserted here -->
            </div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}?v=2"></script>
</body>
</html>
